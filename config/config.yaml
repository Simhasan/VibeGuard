# VibePenTester Configuration File

scanning:
  max_depth: 1           # Reduced from 3
  max_pages: 10          # Reduced from 50
  max_subdomains: 10     # Reduced from 100
  request_delay: 0.5
  timeout: 30
  user_agent: "VibePenTester Security Scanner"

security_testing:
  xss:
    enabled: true
    max_payloads: 5      # Reduced from 20
  sqli:
    enabled: true
    max_payloads: 5      # Reduced from 20
  csrf:
    enabled: false       # Disable to speed up
  auth:
    enabled: true

reporting:
  min_severity: "low"  # low, medium, high, critical
  include_evidence: true
  include_remediation: true

llm:
  provider: ollama

  openai:
    temperature: 0.7
    max_tokens: 4000
  anthropic:
    temperature: 0.7
    max_tokens: 4000
  ollama:
    temperature: 0.7
    max_tokens: 4000
    # Default model to use if none specified
    default_model: "mistral"